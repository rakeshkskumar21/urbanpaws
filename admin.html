<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Paws Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --paw: #E8531A;
    --paw-soft: #FDE4C8;
    --night: #0F0F0F;
    --cream: #FEF3E8;
    --muted: #666;
    --border: #E8E0D8;
    --green: #16a34a;
    --yellow: #ca8a04;
    --red: #dc2626;
    --blue: #2563eb;
  }
  body { font-family: 'Inter', sans-serif; background: #F5F5F0; color: var(--night); min-height: 100vh; }

  /* ── LOGIN ── */
  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--cream);
  }
  .login-card {
    background: #fff; border-radius: 24px; padding: 2.5rem;
    width: 100%; max-width: 380px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    text-align: center;
  }
  .login-logo { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--paw); margin-bottom: 0.25rem; }
  .login-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }
  .login-card input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 0.95rem; font-family: inherit;
    outline: none; margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .login-card input:focus { border-color: var(--paw); }
  .login-btn {
    width: 100%; padding: 13px; background: var(--paw); color: #fff;
    border: none; border-radius: 100px; font-size: 1rem; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-err { color: var(--red); font-size: 0.85rem; margin-top: 0.75rem; display: none; }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }
  header {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 2rem; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .header-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--paw); }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .logout-btn {
    background: none; border: 1px solid var(--border); border-radius: 100px;
    padding: 6px 16px; font-size: 0.8rem; cursor: pointer; font-family: inherit;
    color: var(--muted); transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--paw); color: var(--paw); }
  .refresh-btn {
    background: var(--paw); color: #fff; border: none; border-radius: 100px;
    padding: 7px 18px; font-size: 0.8rem; cursor: pointer; font-family: inherit;
    font-weight: 600; transition: opacity 0.2s;
  }
  .refresh-btn:hover { opacity: 0.85; }

  main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  /* ── STATS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-card {
    background: #fff; border-radius: 16px; padding: 1.25rem 1.5rem;
    border: 1px solid var(--border);
  }
  .stat-label { font-size: 0.78rem; color: var(--muted); font-weight: 500; margin-bottom: 0.4rem; }
  .stat-value { font-size: 2rem; font-weight: 700; color: var(--night); font-family: 'Syne', sans-serif; }
  .stat-card.highlight .stat-value { color: var(--paw); }

  /* ── FILTERS ── */
  .filters {
    background: #fff; border-radius: 16px; padding: 1rem 1.5rem;
    border: 1px solid var(--border); margin-bottom: 1.5rem;
    display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
  }
  .filters select, .filters input {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.85rem; font-family: inherit; outline: none; color: var(--night);
    background: #fff;
  }
  .filters select:focus, .filters input:focus { border-color: var(--paw); }
  .filter-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }

  /* ── TABLE ── */
  .table-wrap {
    background: #fff; border-radius: 16px; border: 1px solid var(--border);
    overflow: hidden;
  }
  .table-header {
    padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-title { font-weight: 700; font-size: 1rem; }
  .table-count { font-size: 0.8rem; color: var(--muted); }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  th {
    text-align: left; padding: 10px 14px; font-size: 0.75rem;
    font-weight: 600; color: var(--muted); background: #FAFAFA;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td { padding: 12px 14px; font-size: 0.85rem; border-bottom: 1px solid #F0F0EC; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAFAF8; }

  /* ── BADGES ── */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 100px;
    font-size: 0.72rem; font-weight: 600; white-space: nowrap;
  }
  .badge-pending  { background: #FEF9C3; color: #854D0E; }
  .badge-confirmed{ background: #DCFCE7; color: #166534; }
  .badge-completed{ background: #DBEAFE; color: #1E40AF; }
  .badge-cancelled{ background: #FEE2E2; color: #991B1B; }
  .flag { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; margin: 2px 2px 2px 0; }
  .flag-red  { background: #FEE2E2; color: #991B1B; }
  .flag-yellow { background: #FEF9C3; color: #854D0E; }
  .flag-green { background: #DCFCE7; color: #166534; }

  /* ── STATUS SELECT ── */
  .status-select {
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px;
    font-size: 0.78rem; font-family: inherit; cursor: pointer; outline: none;
  }

  /* ── EMPTY / LOADING ── */
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .loading { text-align: center; padding: 2rem; color: var(--muted); }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    main { padding: 1rem; }
    header { padding: 0 1rem; }
  }
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .filters { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🐾 Urban Paws</div>
    <div class="login-sub">Admin Panel — Staff only</div>
    <input type="password" id="pwInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') login()" />
    <button class="login-btn" onclick="login()">Sign In →</button>
    <div class="login-err" id="loginErr">Incorrect password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div class="header-logo">🐾 Urban Paws Admin</div>
    <div class="header-right">
      <button class="refresh-btn" onclick="loadBookings()">↻ Refresh</button>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card highlight">
        <div class="stat-label">Total Bookings</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-value" id="statToday">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-value" id="statCompleted">—</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <span class="filter-label">Filter:</span>
      <select id="filterService" onchange="applyFilters()">
        <option value="">All Services</option>
        <option>🦮 Walk</option>
        <option>🍲 Food</option>
        <option>✂️ Grooming</option>
        <option>🏠 Boarding</option>
        <option>💉 Vaccination</option>
        <option>🚐 Pet Taxi</option>
      </select>
      <select id="filterStatus" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input type="date" id="filterDate" onchange="applyFilters()" />
      <input type="text" id="filterSearch" placeholder="Search name / phone…" oninput="applyFilters()" style="min-width:180px;" />
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">Bookings</div>
        <div class="table-count" id="tableCount"></div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Booking ID</th>
              <th>Date/Time</th>
              <th>Service</th>
              <th>Pet</th>
              <th>Owner</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Health Flags</th>
              <th>Payment</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bookingsBody">
            <tr><td colspan="10" class="loading">Loading bookings…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const ADMIN_PASSWORD = 'UrbanPaws@2026'; // Change this to your preferred password

  const { createClient } = supabase;
  const db = createClient(
    'https://uyawcevbvxlhfbovntxh.supabase.co',
    'sb_publishable_5RjxyRY4hp8a4oI10HK5wQ_GqWjLJK5'
  );

  let allBookings = [];

  // ── Auth ──
  function login() {
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PASSWORD) {
      sessionStorage.setItem('up_admin', '1');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadBookings();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }
  function logout() {
    sessionStorage.removeItem('up_admin');
    location.reload();
  }
  if (sessionStorage.getItem('up_admin') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadBookings();
  }

  // ── Load bookings ──
  async function loadBookings() {
    document.getElementById('bookingsBody').innerHTML =
      '<tr><td colspan="10" class="loading">Loading…</td></tr>';

    const { data, error } = await db
      .from('bookings')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('bookingsBody').innerHTML =
        '<tr><td colspan="10" class="empty">Error loading bookings: ' + error.message + '</td></tr>';
      return;
    }

    allBookings = data || [];
    updateStats();
    applyFilters();
  }

  // ── Stats ──
  function updateStats() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('statTotal').textContent = allBookings.length;
    document.getElementById('statToday').textContent =
      allBookings.filter(b => (b.created_at || '').startsWith(today)).length;
    document.getElementById('statPending').textContent =
      allBookings.filter(b => b.status === 'pending').length;
    document.getElementById('statCompleted').textContent =
      allBookings.filter(b => b.status === 'completed').length;
  }

  // ── Filters ──
  function applyFilters() {
    const service = document.getElementById('filterService').value.toLowerCase();
    const status  = document.getElementById('filterStatus').value;
    const date    = document.getElementById('filterDate').value;
    const search  = document.getElementById('filterSearch').value.toLowerCase();

    const filtered = allBookings.filter(b => {
      if (service && !(b.service || '').toLowerCase().includes(service)) return false;
      if (status  && b.status !== status) return false;
      if (date    && b.booking_date !== date) return false;
      if (search  && !(
        (b.pet_name || '').toLowerCase().includes(search) ||
        (b.phone    || '').includes(search) ||
        (b.email    || '').toLowerCase().includes(search) ||
        (b.booking_id || '').toLowerCase().includes(search)
      )) return false;
      return true;
    });

    document.getElementById('tableCount').textContent = filtered.length + ' booking' + (filtered.length !== 1 ? 's' : '');
    renderTable(filtered);
  }

  // ── Render table ──
  function renderTable(bookings) {
    if (!bookings.length) {
      document.getElementById('bookingsBody').innerHTML =
        '<tr><td colspan="10" class="empty">No bookings found.</td></tr>';
      return;
    }

    document.getElementById('bookingsBody').innerHTML = bookings.map(b => {
      const flags = healthFlags(b);
      const dt = b.created_at ? new Date(b.created_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—';
      return `<tr>
        <td><strong>${b.booking_id || '—'}</strong><br><span style="font-size:0.72rem;color:#aaa">${dt}</span></td>
        <td>${b.booking_date || '—'}<br><span style="color:var(--muted);font-size:0.78rem">${b.time_slot || ''}</span></td>
        <td>${b.service || '—'}</td>
        <td><strong>${b.pet_name || '—'}</strong><br><span style="color:var(--muted);font-size:0.78rem">${b.breed || ''} · ${b.pet_age || ''} · ${b.gender || ''}</span></td>
        <td>${b.email || '—'}<br><span style="color:var(--muted);font-size:0.78rem">${b.phone || ''}</span></td>
        <td>${b.phone || '—'}</td>
        <td style="max-width:160px;word-break:break-word;font-size:0.78rem">${b.address || '—'}</td>
        <td>${flags || '<span style="color:#ccc">None</span>'}</td>
        <td style="font-size:0.78rem">${b.payment || '—'}</td>
        <td>
          <select class="status-select" onchange="updateStatus('${b.id}', this.value)">
            <option value="pending"   ${b.status==='pending'   ? 'selected':''}>⏳ Pending</option>
            <option value="confirmed" ${b.status==='confirmed' ? 'selected':''}>✅ Confirmed</option>
            <option value="completed" ${b.status==='completed' ? 'selected':''}>🎉 Completed</option>
            <option value="cancelled" ${b.status==='cancelled' ? 'selected':''}>❌ Cancelled</option>
          </select>
        </td>
      </tr>`;
    }).join('');
  }

  // ── Health flags ──
  function healthFlags(b) {
    const flags = [];
    if (b.limping && b.limping.toLowerCase().includes('limping'))
      flags.push('<span class="flag flag-red">🦵 Limping</span>');
    if (b.recent_surgery && b.recent_surgery.toLowerCase().includes('within'))
      flags.push('<span class="flag flag-red">🏥 Surgery</span>');
    if (b.allergies && b.allergies.toLowerCase().includes('yes'))
      flags.push('<span class="flag flag-yellow">🤧 Allergy</span>');
    if (b.temperament && (b.temperament.toLowerCase().includes('aggressive') || b.temperament.toLowerCase().includes('reactive')))
      flags.push('<span class="flag flag-red">⚠️ Aggressive</span>');
    if (b.vaccinated && b.vaccinated.toLowerCase().includes('not vacc'))
      flags.push('<span class="flag flag-yellow">💉 Unvaccinated</span>');
    if (b.eating_habits && b.eating_habits.toLowerCase().includes('not eating'))
      flags.push('<span class="flag flag-red">🍽 Not Eating</span>');
    return flags.join('');
  }

  // ── Update status ──
  async function updateStatus(id, status) {
    const { error } = await db.from('bookings').update({ status }).eq('id', id);
    if (error) { alert('Failed to update status: ' + error.message); return; }
    const booking = allBookings.find(b => String(b.id) === String(id));
    if (booking) booking.status = status;
    updateStats();
  }
</script>
</body>
</html>
