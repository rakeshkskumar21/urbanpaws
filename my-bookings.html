<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings | Urban Paws</title>
<meta name="robots" content="noindex">
<style>
  :root {
    --paw: #E8531A;
    --text: #1a1a1a;
    --muted: #6b7280;
    --surface: #f9f9f7;
    --border: #e5e7eb;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', system-ui, -apple-system, sans-serif; color: var(--text); background: var(--surface); min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap');

  /* NAV */
  nav {
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1.1rem; text-decoration: none; color: var(--text); }
  .logo-paw { font-size: 1.3rem; }
  .nav-back { font-size: 0.85rem; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .nav-back:hover { color: var(--paw); }

  /* MAIN */
  main { max-width: 720px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.25rem; }
  .page-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

  /* AUTH GATE */
  .auth-gate {
    background: #fff;
    border-radius: var(--radius);
    padding: 2.5rem;
    text-align: center;
    border: 1px solid var(--border);
  }
  .auth-gate h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
  .auth-gate p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .btn-paw {
    display: inline-block;
    background: var(--paw);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    font-family: inherit;
  }
  .btn-paw:hover { background: #d4461a; }

  /* BOOKING CARDS */
  .bookings-list { display: flex; flex-direction: column; gap: 1rem; }
  .booking-card {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.5rem 1rem;
    align-items: start;
  }
  .booking-id { font-size: 0.78rem; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
  .booking-service { font-weight: 700; font-size: 1rem; }
  .booking-pet { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
  .booking-meta { font-size: 0.82rem; color: var(--muted); margin-top: 6px; display: flex; flex-wrap: wrap; gap: 8px; }
  .booking-meta span { display: flex; align-items: center; gap: 4px; }
  .status-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    white-space: nowrap;
    text-transform: capitalize;
  }
  .status-pending   { background: #fef3c7; color: #92400e; }
  .status-confirmed { background: #dbeafe; color: #1e40af; }
  .status-completed { background: #dcfce7; color: #166534; }
  .status-cancelled { background: #fee2e2; color: #991b1b; }

  .empty-state {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 3rem 2rem;
    text-align: center;
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
  .empty-state p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

  .loading { text-align: center; padding: 3rem; color: var(--muted); }

  /* REALTIME PILL */
  .rt-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    color: #16a34a;
    background: #dcfce7;
    border-radius: 20px;
    padding: 3px 10px;
    margin-bottom: 1.25rem;
  }
  .rt-dot { width: 6px; height: 6px; border-radius: 50%; background: #16a34a; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: #1a1a1a;
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    z-index: 9999;
    transition: transform 0.3s;
    white-space: nowrap;
    max-width: 90vw;
    white-space: normal;
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #16a34a; }

  @media (max-width: 480px) {
    .booking-card { grid-template-columns: 1fr; }
    .status-badge { justify-self: start; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span class="logo-paw">🐾</span> Urban Paws</a>
  <a href="index.html" class="nav-back">← Back to home</a>
</nav>

<main>
  <h1>My Bookings</h1>
  <p class="page-sub">All your Urban Paws bookings in one place.</p>

  <!-- Auth gate (shown when logged out) -->
  <div class="auth-gate" id="authGate" style="display:none">
    <div style="font-size:2.5rem; margin-bottom:1rem;">🔐</div>
    <h2>Log in to view your bookings</h2>
    <p>You need to be logged in to see your booking history and get live status updates.</p>
    <a href="index.html" class="btn-paw">Go to Home & Login</a>
  </div>

  <!-- Bookings view (shown when logged in) -->
  <div id="bookingsView" style="display:none">
    <div class="rt-pill"><div class="rt-dot"></div>Live status updates on</div>
    <div id="bookingsList" class="bookings-list">
      <div class="loading">Loading your bookings…</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://uyawcevbvxlhfbovntxh.supabase.co',
    'sb_publishable_5RjxyRY4hp8a4oI10HK5wQ_GqWjLJK5'
  );

  let realtimeChannel = null;

  const STATUS_LABELS = { pending: '⏳ Pending', confirmed: '✅ Confirmed', completed: '🎉 Completed', cancelled: '❌ Cancelled' };

  function statusBadge(status) {
    return `<span class="status-badge status-${status || 'pending'}">${STATUS_LABELS[status] || status}</span>`;
  }

  function renderCard(b) {
    return `
      <div class="booking-card" id="card-${b.id}">
        <div>
          <div class="booking-id">#${b.booking_id || b.id}</div>
          <div class="booking-service">${b.service || '—'}</div>
          <div class="booking-pet">🐾 ${b.pet_name || '—'} · ${b.breed || '—'}</div>
          <div class="booking-meta">
            <span>📅 ${b.booking_date || '—'}</span>
            <span>⏰ ${b.time_slot || '—'}</span>
            <span>📞 ${b.phone || '—'}</span>
          </div>
        </div>
        <div id="status-${b.id}">${statusBadge(b.status)}</div>
      </div>`;
  }

  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => el.className = 'toast', 3500);
  }

  async function loadBookings(email) {
    const list = document.getElementById('bookingsList');
    const { data, error } = await db.from('bookings').select('*').eq('email', email).order('created_at', { ascending: false });
    if (error) { list.innerHTML = '<div class="loading">Could not load bookings. Please try again.</div>'; return; }
    if (!data || data.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📭</div>
        <h3>No bookings yet</h3>
        <p>You haven't made any bookings with this account yet.</p>
        <a href="index.html#booking" class="btn-paw">Book a Service →</a>
      </div>`;
      return;
    }
    list.innerHTML = data.map(renderCard).join('');
  }

  function subscribeRealtime(email) {
    if (realtimeChannel) db.removeChannel(realtimeChannel);
    realtimeChannel = db.channel('my-bookings-' + email)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bookings', filter: 'email=eq.' + email }, payload => {
        const b = payload.new;
        const statusEl = document.getElementById('status-' + b.id);
        if (statusEl) statusEl.innerHTML = statusBadge(b.status);
        showToast('🐾 Booking #' + b.booking_id + ' is now ' + b.status + '!', 'success');
        if (Notification.permission === 'granted') {
          new Notification('Urban Paws Update', { body: 'Booking #' + b.booking_id + ' (' + b.service + ') is now ' + b.status + '.' });
        }
      })
      .subscribe();
    if (Notification.permission === 'default') Notification.requestPermission();
  }

  db.auth.onAuthStateChange((_event, session) => {
    const authGate = document.getElementById('authGate');
    const bookingsView = document.getElementById('bookingsView');
    if (session && session.user) {
      authGate.style.display = 'none';
      bookingsView.style.display = 'block';
      loadBookings(session.user.email);
      subscribeRealtime(session.user.email);
    } else {
      authGate.style.display = 'block';
      bookingsView.style.display = 'none';
      if (realtimeChannel) { db.removeChannel(realtimeChannel); realtimeChannel = null; }
    }
  });
</script>
</body>
</html>
