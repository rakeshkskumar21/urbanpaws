<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Urban Paws</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --paw: #6C6FD4; --paw2: #5254B8; --paw-soft: #EDEEFA; --night: #1a1a2e; --muted: #6b7280; --border: #e5e7eb; --white: #fff; }
    body { font-family: 'Inter', sans-serif; background: var(--paw-soft); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card {
      background: var(--white); border-radius: 20px; padding: 2.5rem 2rem;
      width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(108,111,212,.12);
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--paw); margin-bottom: 1.75rem; display: block; }
    h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--night); margin-bottom: .4rem; }
    .sub { font-size: .85rem; color: var(--muted); margin-bottom: 1.75rem; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
    .field label { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .field .pw-wrap { position: relative; }
    .field input { width: 100%; padding: 11px 40px 11px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: .9rem; font-family: inherit; outline: none; transition: border-color .15s; }
    .field input:focus { border-color: var(--paw); }
    .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex; align-items: center; }
    .err { font-size: .8rem; min-height: 1.1rem; margin-bottom: .5rem; }
    .err.error { color: #dc2626; }
    .err.success { color: #16a34a; }
    .btn {
      width: 100%; padding: 13px; background: var(--paw); color: #fff; border: none;
      border-radius: 100px; font-size: 1rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background .15s; margin-top: .25rem;
    }
    .btn:hover { background: var(--paw2); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .back { display: block; text-align: center; margin-top: 1.25rem; font-size: .83rem; color: var(--muted); text-decoration: none; }
    .back span { color: var(--paw); font-weight: 600; cursor: pointer; }
    .spinner { display: none; text-align: center; margin-top: 1.5rem; }
    .spinner.show { display: block; }
  </style>
</head>
<body>
  <div class="card" id="resetCard">
    <span class="logo">🐾 Urban Paws</span>
    <h2>Set new password</h2>
    <p class="sub">Enter your new password below. You'll be signed in automatically.</p>

    <div class="field">
      <label>New Password</label>
      <div class="pw-wrap">
        <input type="password" id="newPassword" placeholder="Min 6 characters" autocomplete="new-password">
        <button type="button" class="pw-toggle" onclick="togglePw('newPassword', this)" aria-label="Toggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
        <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword', this)" aria-label="Toggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div class="err" id="resetErr"></div>
    <button class="btn" id="resetBtn" onclick="resetPassword()">Update Password →</button>
    <a class="back" href="index.html"><span>← Back to Sign In</span></a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(
      'https://uyawcevbvxlhfbovntxh.supabase.co',
      'sb_publishable_5RjxyRY4hp8a4oI10HK5wQ_GqWjLJK5'
    );

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    }

    function showErr(msg, isSuccess) {
      const el = document.getElementById('resetErr');
      el.textContent = msg;
      el.className = 'err ' + (isSuccess ? 'success' : 'error');
    }

    async function resetPassword() {
      const pw = document.getElementById('newPassword').value;
      const pw2 = document.getElementById('confirmPassword').value;
      if (!pw || pw.length < 6) { showErr('Password must be at least 6 characters.'); return; }
      if (pw !== pw2) { showErr('Passwords do not match.'); return; }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.textContent = 'Updating…';

      const { error } = await db.auth.updateUser({ password: pw });
      if (error) {
        btn.disabled = false; btn.textContent = 'Update Password →';
        showErr(error.message);
        return;
      }

      showErr('✅ Password updated successfully! Redirecting…', true);
      btn.disabled = true; btn.textContent = '✅ Done!';

      setTimeout(async () => {
        await db.auth.signOut();
        window.location.href = 'index.html';
      }, 2000);
    }

    // Supabase sends the recovery token via URL hash — the client handles it automatically
    db.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // User arrived via reset link — form is ready
        document.getElementById('newPassword').focus();
      }
    });
  </script>
</body>
</html>
